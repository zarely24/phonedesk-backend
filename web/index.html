<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Devices — PhoneDesk</title>
  <link rel="stylesheet" href="/style.css?v=4">
</head>
<body>
  <div class="topbar">
    <div class="brand">Phone<span>Desk</span></div>
    <div class="userbox">
      <span id="who"></span>
      <button class="btn" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="wrap">
    <div class="pagehead">
      <h2>Devices</h2>
      <button id="addBtn" class="btn primary hide" onclick="addDevice()">+ Add device</button>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr><th>Status</th><th>Name</th><th>Phone</th><th>Last online</th><th></th></tr>
        </thead>
        <tbody id="rows"><tr><td colspan="5" class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <div id="modal" class="modal-bg hide">
    <div class="card modal">
      <h3>Add a device</h3>
      <p class="muted" style="margin:0">Send the owner the desktop app, then have them type this code in it:</p>
      <div id="codeBox" class="code">…</div>
      <p class="muted" id="codeExp" style="margin:0;text-align:center"></p>
      <div class="row"><button class="btn" onclick="closeModal()">Done</button></div>
    </div>
  </div>

  <div id="logsModal" class="modal-bg hide">
    <div class="card modal" style="width:min(760px,92vw)">
      <h3 id="logsTitle">Logs</h3>
      <p class="muted" style="margin:0">Live agent log (newest at the bottom, refreshes every 2s).</p>
      <div id="logsBox" style="height:60vh;overflow:auto;white-space:pre-wrap;word-break:break-word;
        font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.5;
        background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--muted)">Loading…</div>
      <div class="row">
        <button class="btn" id="copyLogsBtn" onclick="copyLogs()">Copy</button>
        <button class="btn" onclick="closeLogs()">Close</button>
      </div>
    </div>
  </div>

  <script src="/app.js?v=6"></script>
</body>
</html>
