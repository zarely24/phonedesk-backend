<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<title>PhoneDesk</title>
<script defer="defer" src="bundle.js"></script>
<link href="main.css" rel="stylesheet">
<style>
  /* PhoneDesk theme — match the dashboard (#0f1115) and smooth the controls. */
  :root {
    --stream-bg-color: #0f1115 !important;
    --main-bg-color: #0f1115 !important;
    --control-buttons-bg-color: #171a21 !important;
    --controls-bg-color: rgba(23,26,33,.96) !important;
    --svg-button-fill: #c7cdd8 !important;
    --svg-checkbox-bg-color: #4f8cff !important;
    --text-color: #e7e9ee !important;
  }
  html, body, body.stream { background: #0f1115 !important; }
  /* Center the live phone in the window (instead of floating to the right). */
  body.stream { display: flex !important; align-items: center; justify-content: center; }
  .device-view { float: none !important; }
  /* Smooth, rounded control bar */
  .control-buttons-list { background: transparent !important; padding: 6px 4px; }
  .control-button { border-radius: 10px; opacity: .8; transition: background .15s, opacity .15s; }
  .control-button:hover { opacity: 1; background: #1f232c !important; }
  .more-box { background: rgba(23,26,33,.97) !important; border: 1px solid #2a2f3a; border-radius: 12px; }
</style>
</head>
<body>
<script>
/* PhoneDesk: skip the device list — drop straight into the live WebCodecs screen.
   The ws-scrcpy client reads the URL hash on load and, if it's action=stream, starts the player.
   So we find the (single) phone's WebCodecs link, point the URL at it, and reload. */
(function () {
  if (/action=stream/.test(location.hash)) return; // already viewing a stream
  var tries = 0;
  var iv = setInterval(function () {
    if (/action=stream/.test(location.hash)) { clearInterval(iv); return; }
    var link = Array.prototype.slice.call(document.querySelectorAll('a')).find(function (a) {
      return /player=webcodecs/i.test(a.getAttribute('href') || '') ||
             (a.textContent || '').trim().toLowerCase() === 'webcodecs';
    });
    if (link) {
      clearInterval(iv);
      try { location.href = link.href; location.reload(); } catch (e) {}
    } else if (++tries > 60) {
      clearInterval(iv); // ~30s with no streamable device — leave the list visible
    }
  }, 500);
})();
</script>
</body>
</html>
